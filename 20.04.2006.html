<!DOCTYPE html>
<html lang="uk">
<head>
    <title>Про мене</title>
    <style>
        html { zoom: 2; }

        * {
            box-sizing: border-box;
        }

        h1 {
            border: 1px solid red;
            /* display: inline; */
        }
        span {
            font-size: 2rem;
            font-weight: bold;

            border: 1px solid red;
            /* display: block; */
        }
        hr { border: 5px solid whitesmoke; }
        ul {
            border: 1px dashed gray;
        }
        li {
            border: 1px solid green;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h1>Зоя Че</h1>
    <span>Зоя Че</span>

    <h2>Мої хобі</h2>
    <hr>
    <ul>
        <li>відеоподорожі</li>
        <li>психологія</li>
        <li>відео про тварин</li>
        <li>худ мистецтво</li>
        <li>фото котиків</li>
        <li>скульптура</li>
    </ul>

<h2>трохи фото</h2>
<hr>
<img src="африка.png" width="200" style="vertical-align: top; display: inline-block;"/>

<img src="котик.jpg"width="200"/>

</body>
</html>
